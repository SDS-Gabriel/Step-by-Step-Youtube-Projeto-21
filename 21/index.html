<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Skills Bar | CodingLab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="skill-box">
            <span class="title">HTML</span>
            <div class="skill-bar">
                <span class="skill-per" style="--per: 90%;">
                    <span class="tooltip">90%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">CSS</span>
            <div class="skill-bar">
                <span class="skill-per" style="--per: 75%;">
                    <span class="tooltip">75%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">JavaScript</span>
            <div class="skill-bar">
                <span class="skill-per" style="--per: 60%;">
                    <span class="tooltip">60%</span>
                </span>
            </div>
        </div>
    </div>

</body>
</html>
